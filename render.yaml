services:
  - type: web
    plan: starter
    name: flask-hello-world
    runtime: python
    repo: https://github.com/adirksmeier-render/flask-hello-world
    buildCommand: 'pip install -r requirements.txt'
    startCommand: 'gunicorn app:app'
    buildFilter:
      paths:
        - test/changed 

databases:
  - name: test_logical_replication
    plan: pro-4gb
    ipAllowList: # Default: allows all connections
      - source: 24.34.81.82
        description: lcars
